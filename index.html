<!DOCTYPE html>
<html lang="fr">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Date Alphabet</title>
  <link rel="stylesheet" href="style.css" />
</head>
<body>

  <div class="lock-screen" id="lock-screen">
    <div class="lock-card">
      <div class="lock-icon">🔒</div>
      <h2>Accès protégé</h2>
      <input type="password" id="lock-input" inputmode="numeric" placeholder="Code d'accès" autocomplete="off" />
      <button id="lock-submit">Valider</button>
      <p class="lock-error" id="lock-error">Code incorrect</p>
    </div>
  </div>

  <header>
    <h1>Date de A à Z</h1>
  </header>

  <main>
    <div class="grid" id="alphabet-grid"></div>

    <section class="next-section">
      <h2 class="next-title">Prochain à faire</h2>
      <div class="next-card" id="next-card" role="button" tabindex="0">
        <span class="next-empty">Appuie ici pour choisir une activité</span>
      </div>
    </section>

    <div class="picker-backdrop" id="picker-backdrop">
      <div class="picker-modal" id="picker-modal">
        <div class="picker-header">
          <span>Choisir une activité</span>
          <button class="close-btn" id="close-picker">✕</button>
        </div>
        <div class="picker-body" id="picker-body"></div>
      </div>
    </div>

    <aside class="panel" id="panel">
      <div class="panel-header">
        <span class="panel-letter" id="panel-letter">A</span>
        <button class="close-btn" id="close-panel">✕</button>
      </div>
      <ul class="ideas-list" id="ideas-list"></ul>
      <div class="add-idea">
        <input type="text" id="new-idea-input" placeholder="Ajouter une idée…" />
        <button id="add-idea-btn">+</button>
      </div>
    </aside>
  </main>

  <div class="overlay" id="overlay"></div>

  <div class="photo-backdrop" id="photo-backdrop">
    <div class="photo-modal" id="photo-modal">
      <div class="photo-modal-header">
        <span id="photo-modal-title"></span>
        <button class="close-btn" id="close-photo">✕</button>
      </div>
      <div class="caption-box" id="caption-box">
        <span class="caption-text" id="caption-text"></span>
        <input type="text" class="caption-input" id="caption-input" placeholder="Légende de l'activité…" />
        <span class="caption-saved" id="caption-saved">✓ Enregistré</span>
        <button class="caption-btn" id="caption-btn">✏️</button>
      </div>
      <div class="photo-grid" id="photo-grid"></div>
      <label class="add-photo-btn">
        <input type="file" id="photo-input" accept="image/*" multiple />
        + Ajouter des photos
      </label>
    </div>
  </div>

  <div class="confirm-backdrop" id="confirm-backdrop">
    <div class="confirm-card">
      <p class="confirm-msg" id="confirm-msg"></p>
      <div class="confirm-actions">
        <button class="confirm-cancel" id="confirm-cancel">Annuler</button>
        <button class="confirm-ok" id="confirm-ok">Supprimer</button>
      </div>
    </div>
  </div>

  <script>
    (function () {
      const ACCESS_CODE = '200426';
      const screen = document.getElementById('lock-screen');
      const input = document.getElementById('lock-input');
      const error = document.getElementById('lock-error');
      const submit = document.getElementById('lock-submit');

      function tryUnlock() {
        if (input.value.trim() === ACCESS_CODE) {
          screen.style.display = 'none';
        } else {
          error.style.display = 'block';
          input.value = '';
          input.focus();
        }
      }

      submit.addEventListener('click', tryUnlock);
      input.addEventListener('keydown', e => { if (e.key === 'Enter') tryUnlock(); });
    })();
  </script>

  <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
  <script src="config.js"></script>
  <script src="app.js"></script>
</body>
</html>
